# ============================================================
# MyUS University Portal – Backend Application Configuration
# ============================================================
# Copy this file to application-local.properties and fill in
# the real values for your local environment. Never commit
# secrets to source control.
# ============================================================

# ----- Server -----
server.port=8080
server.servlet.context-path=/

# ----- Spring Datasource (SQL Server) -----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=MyUS;encrypt=false;trustServerCertificate=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:16082006}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ----- JPA / Hibernate -----
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ----- Flyway Database Migration -----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=myus
spring.flyway.create-schemas=true

# ----- JWT (T004) -----
app.jwt.secret=${JWT_SECRET:VmVyeVNlY3VyZVNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbjEyMw==}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ----- CORS (T004) -----
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ----- SpringDoc / OpenAPI (T006) -----
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ----- Actuator -----
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ----- Logging -----
logging.level.com.myus=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO

# ----- Load shared SQL seed on startup (apply shared DB data) -----
# Run SQL seed file located at src/main/resources/db/mock_data_myus.sql
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:db/mock_data_myus.sql
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
