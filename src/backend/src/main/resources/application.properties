# ============================================================
# MyUS University Portal – Backend Application Configuration
# ============================================================
# Copy this file to application-local.properties and fill in
# the real values for your local environment. Never commit
# secrets to source control.
# ============================================================

# ----- Server -----
server.port=8080
server.servlet.context-path=/

# ----- Spring Datasource (SQL Server) -----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=myus_db;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ----- JPA / Hibernate -----
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ----- Flyway Database Migration -----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ----- JWT (T004) -----
app.jwt.secret=${JWT_SECRET:replace-with-a-secure-256-bit-base64-encoded-secret}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ----- SpringDoc / OpenAPI (T006) -----
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ----- Actuator -----
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ----- Logging -----
logging.level.com.myus=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO
