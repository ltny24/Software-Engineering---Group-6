# ============================================================
# MyUS – Local Development Profile (SQL Server Database)
# ============================================================
# Activate with: --spring.profiles.active=local
# ============================================================

# ----- Spring Datasource (SQL Server) -----
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=myus_db;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Khoidmh1106
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ----- JPA / Hibernate -----
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=myus

# ----- Flyway Database Migration -----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=myus
spring.flyway.create-schemas=true

# ----- JWT -----
app.jwt.secret=VmVyeVNlY3VyZVNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbjEyMw==
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ----- CORS -----
app.cors.allowed-origins=http://localhost:3000
