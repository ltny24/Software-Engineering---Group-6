# ============================================================
# MyUS – Local Development Profile (H2 In-Memory Database)
# ============================================================
# Activate with: --spring.profiles.active=local
# ============================================================

# ----- H2 In-Memory Database -----
spring.datasource.url=jdbc:h2:mem:myus_db;DB_CLOSE_DELAY=-1;MODE=MSSQLServer;INIT=CREATE SCHEMA IF NOT EXISTS myus
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ----- Hibernate – auto-create schema from entities -----
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=myus

# ----- H2 Console (for debugging) -----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ----- Disable Flyway (migrations use SQL Server syntax) -----
spring.flyway.enabled=false

# ----- JWT -----
app.jwt.secret=VmVyeVNlY3VyZVNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbjEyMw==
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ----- CORS -----
app.cors.allowed-origins=http://localhost:3000
